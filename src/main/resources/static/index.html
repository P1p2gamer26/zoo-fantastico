<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZooMinder | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="edit-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">Editar Registro</h3>
            <form id="form-edit" class="modern-form"><div id="edit-fields"></div><button type="submit" class="btn-primary">Guardar Cambios</button></form>
        </div>
    </div>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand"><span class="logo">🌿</span><h2>ZooMinder</h2></div>
            <nav>
                <a href="#" class="nav-link active" data-target="view-dashboard">📊 Dashboard</a>
                <a href="#" class="nav-link" data-target="view-zonas">🌍 Zonas</a>
                <a href="#" class="nav-link" data-target="view-criaturas">🐉 Criaturas</a>
            </nav>
        </aside>
        <main class="content">
            <section id="view-dashboard" class="view active">
                <header><h1>Resumen del Zoo</h1></header>
                <div class="stats-grid">
                    <div class="stat-card"><div><h3>Zonas</h3><p id="stat-zonas">0</p></div></div>
                    <div class="stat-card"><div><h3>Criaturas</h3><p id="stat-criaturas">0</p></div></div>
                </div>
                <div class="charts-container">
                    <div class="glass-card chart-box"><h3>Criaturas por Zona</h3><canvas id="chart-poblacion"></canvas></div>
                    <div class="glass-card chart-box"><h3>Estado de Salud</h3><canvas id="chart-salud"></canvas></div>
                </div>
            </section>
            <section id="view-zonas" class="view">
                <header><h1>🌍 Gestión de Zonas</h1></header>
                <div class="glass-card">
                    <form id="form-zona" class="modern-form inline-form">
                        <input type="text" id="zona-nombre" placeholder="Nombre" required>
                        <input type="text" id="zona-desc" placeholder="Descripción" required>
                        <button type="submit" class="btn-primary">Añadir</button>
                    </form>
                    <div class="table-wrapper"><table><thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead><tbody id="tabla-zonas"></tbody></table></div>
                </div>
            </section>
            <section id="view-criaturas" class="view">
                <header><h1>🐉 Registro de Criaturas</h1></header>
                <div class="glass-card">
                    <form id="form-criatura" class="modern-form">
                        <div class="input-group"><input type="text" id="c-nombre" placeholder="Nombre" required><input type="text" id="c-especie" placeholder="Especie" required></div>
                        <div class="input-group"><input type="number" step="0.1" id="c-tamano" placeholder="Tamaño" required><input type="number" id="c-peligro" placeholder="Peligro" required></div>
                        <div class="input-group">
                            <select id="c-salud"><option value="Excelente">Excelente</option><option value="Estable">Estable</option><option value="Crítico">Crítico</option></select>
                            <select id="c-zona-id"></select>
                        </div>
                        <button type="submit" class="btn-primary">Registrar</button>
                    </form>
                    <div class="table-wrapper"><table><thead><tr><th>Criatura</th><th>Info</th><th>Salud</th><th>Zona</th><th>Acciones</th></tr></thead><tbody id="tabla-criaturas"></tbody></table></div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
