<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZooMinder | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand"><span class="logo">🌿</span><h2>ZooMinder</h2></div>
        <nav>
            <a href="/" class="nav-link active">📊 Dashboard</a>
            <a href="/zona" class="nav-link">🌍 Zonas</a>
            <a href="/criatura" class="nav-link">🐉 Criaturas</a>
        </nav>
    </aside>
    <main class="content">
        <section class="view active">
            <header><h1>Resumen del Zoo</h1></header>
            <div class="stats-grid">
                <div class="stat-card"><div><h3>Zonas</h3><p id="stat-zonas">0</p></div></div>
                <div class="stat-card"><div><h3>Criaturas</h3><p id="stat-criaturas">0</p></div></div>
            </div>
            <div class="charts-container">
                <div class="glass-card chart-box"><h3>Criaturas por Zona</h3><canvas id="chart-poblacion"></canvas></div>
                <div class="glass-card chart-box"><h3>Estado de Salud</h3><canvas id="chart-salud"></canvas></div>
            </div>
        </section>
    </main>
</div>
<script>
    async function cargarDashboard() {
        try {
            const [resZ, resC] = await Promise.all([fetch('/api/zonas'), fetch('/api/creatures')]);
            if (!resZ.ok || !resC.ok) throw new Error('Error al cargar datos');
            const zs = await resZ.json();
            const cs = await resC.json();

            document.getElementById('stat-zonas').innerText = zs.length;
            document.getElementById('stat-criaturas').innerText = cs.length;

            new Chart(document.getElementById('chart-poblacion').getContext('2d'), {
                type: 'bar',
                data: {
                    // PROTECCIÓN CONTRA NULL EN GRÁFICA
                    labels: zs.map(z => z.nombre || 'Zona Rota'),
                    datasets: [{ label: 'Población', data: zs.map(z => cs.filter(c => c.zona?.id === z.id).length), backgroundColor: '#10B981', borderRadius: 6 }]
                },
                options: { responsive: true, plugins: { legend: { labels: { color: "#1e293b" } } }, scales: { x: { ticks: { color: "#475569" }, grid: { color: '#334155' } }, y: { ticks: { color: "#475569", stepSize: 1 }, grid: { color: '#334155' }, beginAtZero: true } } }
            });

            const sh = { Excelente: 0, Estable: 0, 'Crítico': 0 };
            cs.forEach(c => { if (sh[c.healthStatus] !== undefined) sh[c.healthStatus]++; });

            new Chart(document.getElementById('chart-salud').getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['Excelente', 'Estable', 'Crítico'], datasets: [{ data: Object.values(sh), backgroundColor: ['#10B981', '#3B82F6', '#EF4444'], borderWidth: 2, borderColor: '#1e293b' }] },
                options: { responsive: true, plugins: { legend: { labels: { color: "#1e293b" } } } }
            });
        } catch (err) { console.error('Error cargando dashboard:', err); }
    }
    cargarDashboard();
</script>
</body>
</html>
