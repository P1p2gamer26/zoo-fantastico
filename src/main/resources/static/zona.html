<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZooMinder | Zonas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="edit-modal" class="modal">
    <div class="modal-content glass-card">
        <span class="close-modal">&times;</span>
        <h3>Editar Zona</h3>
        <form id="form-edit-zona" class="modern-form">
            <input type="hidden" id="edit-zona-id">
            <input type="text" id="edit-zona-nombre" placeholder="Nombre" required>
            <input type="text" id="edit-zona-desc" placeholder="Descripción" required>
            <button type="submit" class="btn-primary">Guardar Cambios</button>
        </form>
    </div>
</div>
<div class="layout">
    <aside class="sidebar">
        <div class="brand"><span class="logo">🌿</span><h2>ZooMinder</h2></div>
        <nav>
            <a href="/" class="nav-link">📊 Dashboard</a>
            <a href="/zona" class="nav-link active">🌍 Zonas</a>
            <a href="/criatura" class="nav-link">🐉 Criaturas</a>
        </nav>
    </aside>
    <main class="content">
        <section class="view active">
            <header><h1>🌍 Gestión de Zonas</h1></header>
            <div class="glass-card">
                <form id="form-zona" class="modern-form inline-form">
                    <input type="text" id="zona-nombre" placeholder="Nombre" required>
                    <input type="text" id="zona-desc" placeholder="Descripción" required>
                    <button type="submit" class="btn-primary">Añadir Zona</button>
                </form>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
                        <tbody id="tabla-zonas"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>
<script>
    const API_Z = '/api/zonas';
    async function cargarZonas() {
        try {
            const res = await fetch(API_Z);
            if (!res.ok) throw new Error('Error al cargar zonas');
            const zs = await res.json();

            document.getElementById('tabla-zonas').innerHTML = zs.map(z => {
                // PROTECCIÓN CONTRA NULL
                const nombre = z.nombre || "ZONA ROTA (Bórrame)";
                const desc = z.descripcion || "Sin descripción";

                return `
                <tr>
                    <td>#${z.id}</td>
                    <td><strong>${nombre}</strong></td>
                    <td>${desc}</td>
                    <td>
                        <button class="btn-edit" onclick="abrirEditarZona(${z.id}, '${nombre.replace(/'/g,"\\'")}', '${desc.replace(/'/g,"\\'")}')">✏</button>
                        <button class="btn-delete" onclick="borrarZona(${z.id})">🗑</button>
                    </td>
                </tr>`;
            }).join('');
        } catch (err) { console.error(err); }
    }
    document.getElementById('form-zona').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch(API_Z, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ nombre: document.getElementById('zona-nombre').value, descripcion: document.getElementById('zona-desc').value }) });
        if (!res.ok) { alert('Error al crear zona'); return; }
        e.target.reset(); cargarZonas();
    };
    window.abrirEditarZona = (id, nombre, descripcion) => {
        document.getElementById('edit-zona-id').value = id;
        document.getElementById('edit-zona-nombre').value = nombre;
        document.getElementById('edit-zona-desc').value = descripcion;
        document.getElementById('edit-modal').style.display = 'flex';
    };
    document.getElementById('form-edit-zona').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-zona-id').value;
        const res = await fetch(`${API_Z}/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ nombre: document.getElementById('edit-zona-nombre').value, descripcion: document.getElementById('edit-zona-desc').value }) });
        if (!res.ok) { alert('Error al actualizar'); return; }
        document.getElementById('edit-modal').style.display = 'none'; cargarZonas();
    };
    window.borrarZona = async (id) => {
        if (!confirm('¿Eliminar esta zona?')) return;
        const res = await fetch(`${API_Z}/${id}`, { method: 'DELETE' });
        if (!res.ok) { alert('No se puede eliminar: ' + await res.text()); return; }
        cargarZonas();
    };
    document.querySelector('.close-modal').onclick = () => document.getElementById('edit-modal').style.display = 'none';
    cargarZonas();
</script>
</body>
</html>
